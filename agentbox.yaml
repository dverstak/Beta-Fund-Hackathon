# AgentBox marketplace manifest
# Distribution target: small-business owners & freelancers automating pre-tax bookkeeping.
schema_version: "1.0"
agent:
  name: contractor-tax-deduction-auditor
  display_name: "Independent Contractor Tax & Deduction Auditor"
  version: "0.1.0"
  track: "Workflow and Operations Agents"
  summary: >
    Autonomous worker that ingests transactional spreadsheets, 1099-NEC forms,
    and receipt photos/PDFs, categorizes them per IRS Schedule C, flags
    high-risk deductions, and compiles an accountant-ready compliance ledger.
  category: "Finance & Bookkeeping"
  audience: ["freelancers", "independent contractors", "small business owners", "bookkeepers"]
  tags: ["taxes", "schedule-c", "1099", "deductions", "bookkeeping", "ocr"]

capabilities:
  - "Multimodal extraction from chaotic receipts & scanned tax forms"
  - "IRS Schedule C line categorization"
  - "High-risk deduction / audit-trigger flagging"
  - "Accountant-ready ledger export (JSON, CSV, Markdown)"

pipeline: [ingest, vision-extract, categorize, risk-flag, ledger]

# Deployed on AgentBox (GMI CE path) as a containerized HTTP service.
deployment:
  type: http-service
  image: "ghcr.io/<owner>/contractor-tax-auditor:latest"
  port: 8080                      # AgentBox maps external 443 -> internal 8080
  healthcheck: "GET /api/health"
  endpoints:
    - "GET  /                 dashboard UI"
    - "POST /api/jobs         submit documents -> 202 {job_id} (async)"
    - "GET  /api/jobs/{id}    poll job status + ledger result"
    - "GET  /api/ledger       latest ledger"
  long_running: "async job pattern (submit + poll) to avoid gateway 504s"
  env:
    GMI_MAAS_API_KEY: "auto-injected by AgentBox (inference)"
    GMI_MAAS_BASE_URL: "auto-injected by AgentBox"
    RESPAN_API_KEY: "secret (optional, enables Respan telemetry)"
    GMI_VISION_MODEL: "text (optional model override)"
    GMI_REASONING_MODEL: "text (optional model override)"

# Also runnable as a CLI for local/batch use.
cli:
  command: "python -m auditor.cli audit {input} --out {output}"
  outputs: [ledger.json, ledger.csv, audit_report.md, respan_metrics.json]

sponsor_tools:
  gmi_cloud:
    role: "Multimodal vision + reasoning inference (receipt/PDF parsing, Schedule C)"
    base_url: "https://api.gmi-serving.com/v1"
    model_env: GMI_VISION_MODEL
  respan:
    role: "Per-document-profile token & cost observability (telemetry logging)"
    metric: "cost per document profile"
  agentbox:
    role: "Marketplace distribution to freelancers & SMBs"

pricing_hint:
  model: per-document
  note: "Local Respan meter reports avg cost/doc; tune model via GMI_VISION_MODEL."

disclaimer: "Outputs are for accountant review and are not tax advice."
